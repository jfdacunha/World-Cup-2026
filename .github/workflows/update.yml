name: Update World Cup Data

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test API connection
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          python3 -c "
import urllib.request, json, os, sys

key = os.environ.get('FOOTBALL_API_KEY','')
print(f'API key present: {bool(key)} (length: {len(key)})')

# Test basic connection
try:
    req = urllib.request.Request(
        'https://api.football-data.org/v4/competitions/',
        headers={'X-Auth-Token': key}
    )
    with urllib.request.urlopen(req, timeout=10) as r:
        data = json.loads(r.read())
        comps = data.get('competitions', [])
        print(f'Available competitions: {len(comps)}')
        for c in comps:
            print(f'  {c[\"code\"]} - {c[\"name\"]} ({c[\"area\"][\"name\"]})')
except Exception as e:
    print(f'API error: {e}')
    sys.exit(1)
"

      - name: Fetch live World Cup data
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update World Cup data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
